<script>
    const log = document.getElementById('log-content');
    const currentLine = document.getElementById('typing-line');
    const img = document.getElementById('modelImg');
    
    // Осмысленные фразы
    const phrases = [
        "system_reboot... OK", "IAmSleep...", "error_log_undefined", 
        "IAmStillHere", "wait... who's there?", "connection_lost", "WAKE_UP"
    ];

    let pool = [...phrases];
    let isFirst = true;

    // ГЕНЕРАТОР ПОЛНОГО РАНДОМА (ЛЮБЫЕ БУКВЫ)
    function generateGlitchText() {
        // Весь алфавит + цифры + символы
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=";
        let result = "";
        // Случайная длина строки от 5 до 25 символов
        const length = Math.floor(Math.random() * 20) + 5; 
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    // Тот самый тяжелый звук клика
    function heavyClick() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        const o1 = ctx.createOscillator();
        const g1 = ctx.createGain();
        o1.frequency.setValueAtTime(50, t);
        o1.frequency.exponentialRampToValueAtTime(10, t + 0.2);
        g1.gain.setValueAtTime(0.5, t);
        g1.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        o1.connect(g1); g1.connect(ctx.destination);
        o1.start(); o1.stop(t + 0.2);
        img.style.filter = "invert(1) brightness(2)";
        setTimeout(() => img.style.filter = "none", 50);
    }

    function typeEffect() {
        let text;
        
        if (isFirst) {
            text = "system_reboot... OK";
            isFirst = false;
        } else {
            // Шанс 50% на осмысленную фразу и 50% на полный рандом букв
            if (Math.random() > 0.5) {
                text = generateGlitchText();
            } else {
                if (pool.length === 0) pool = [...phrases];
                const rand = Math.floor(Math.random() * pool.length);
                text = pool.splice(rand, 1)[0]; // Берем строку из массива
            }
        }

        let i = 0;
        currentLine.innerHTML = "";

        function print() {
            if (i < text.length) {
                currentLine.innerHTML += text.charAt(i);
                i++;
                // Случайная скорость печати (эффект "глюка")
                let speed = Math.random() * 100 + 20;
                setTimeout(print, speed); 
            } else {
                // Когда текст допечатан до конца:
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.textContent = text;
                    log.appendChild(div);
                    currentLine.innerHTML = "";
                    // Очистка старых строк
                    if (log.children.length > 6) log.removeChild(log.firstChild);
                    // Пауза перед следующей порцией рандома
                    setTimeout(typeEffect, 1000 + Math.random() * 1500); 
                }, 1000);
            }
        }
        print();
    }

    function startTeaser() {
        document.getElementById('overlay').style.display = 'none';
        const music = document.getElementById('bgMusic');
        music.volume = 0.5;
        music.play().catch(e => console.log("Audio Error"));
        typeEffect();
    }
</script>
