    <script>
        const log = document.getElementById('log-content');
        const currentLine = document.getElementById('typing-line');
        const modelImg = document.getElementById('modelImg'); // Находим фото
        
        const allPhrases = [
            "jpsdfoerkkf", "kkkkkkkkkkkkkkkkkkkkkkkkkk", "IAmSleep...", 
            "error_log_undefined", "jpsdf_0091", "IAmStillHere",
            "wait... who's there?", "jpsdfoerkkf_terminal_closed", "zzzzzzzzzzzzzzzzzzzz"
        ];

        let availablePhrases = [...allPhrases];
        let isFirstBoot = true;

        // --- ФУНКЦИЯ ЗВУКА КЛИКА (БЕЗ ФАЙЛА) ---
        function playClickSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            oscillator.type = 'sine'; // Мягкий звук
            oscillator.frequency.setValueAtTime(150, context.currentTime); // Низкая частота (хоррор-клик)
            gain.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.1);
            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        // --- ОБРАБОТКА КЛИКА ПО ФОТО ---
        modelImg.onclick = function() {
            playClickSound();
            // Эффект "глюка" при клике (кратковременное мигание)
            modelImg.style.opacity = "0.5";
            setTimeout(() => modelImg.style.opacity = "1", 50);
        };

        function typeEffect() {
            let text;
            if (isFirstBoot) {
                text = "system_reboot... OK";
                isFirstBoot = false;
            } else {
                if (availablePhrases.length === 0) availablePhrases = [...allPhrases];
                const randomIndex = Math.floor(Math.random() * availablePhrases.length);
                text = availablePhrases[randomIndex];
                availablePhrases.splice(randomIndex, 1);
            }

            let i = 0;
            currentLine.innerHTML = "";

            function print() {
                if (i < text.length) {
                    currentLine.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(print, Math.random() * 100 + 40);
                } else {
                    setTimeout(() => {
                        const div = document.createElement('div');
                        div.textContent = text;
                        log.appendChild(div);
                        currentLine.innerHTML = "";
                        if (log.children.length > 6) log.removeChild(log.firstChild);
                        setTimeout(typeEffect, 1200 + Math.random() * 1000);
                    }, 1000);
                }
            }
            print();
        }

        function startTeaser() {
            document.getElementById('overlay').style.display = 'none';
            const audio = document.getElementById('bgMusic');
            audio.volume = 0.5;
            audio.play();
            typeEffect();
        }
    </script>
