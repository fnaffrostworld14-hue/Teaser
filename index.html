<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Teaser Terminal</title>
    <style>
        body { margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        .model-container img { max-width: 80%; max-height: 80%; filter: drop-shadow(0 0 30px rgba(255,255,255,0.07)); cursor: pointer; transition: opacity 0.1s; }
        #console-box { position: fixed; bottom: 25px; right: 25px; width: 320px; height: 180px; background: rgba(0, 0, 0, 0.95); border: 1px solid #1a1a1a; padding: 15px; color: #00ff00; font-size: 14px; line-height: 1.5; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
        .cursor { display: inline-block; width: 10px; height: 16px; background-color: #00ff00; margin-left: 5px; animation: blink 0.8s step-end infinite; vertical-align: middle; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #444; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startTeaser()">[ CLICK TO BOOT SYSTEM ]</div>

    <div class="model-container">
        <!-- Твое фото -->
        <img id="modelImg" src="model.png" onclick="playClickSound()">
    </div>

    <div id="console-box">
        <div id="log-content"></div>
        <div><span id="typing-line"></span><span class="cursor"></span></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const log = document.getElementById('log-content');
        const currentLine = document.getElementById('typing-line');
        const img = document.getElementById('modelImg');
        
        const phrases = ["jpsdfoerkkf", "kkkkkkkkkkkkkkkkkkkk", "IAmSleep...", "jpsdf_0091", "IAmStillHere", "wait...", "zzzzzzzz"];
        let pool = [...phrases];
        let isFirst = true;

        // Звук клика (генерируется кодом, файл не нужен)
        function playClickSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, ctx.currentTime); // Низкий звук
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
            
            // Мигание фото при клике
            img.style.opacity = "0.3";
            setTimeout(() => img.style.opacity = "1", 50);
        }

        function typeEffect() {
            let text;
            if (isFirst) { text = "system_reboot... OK"; isFirst = false; } 
            else {
                if (pool.length === 0) pool = [...phrases];
                const idx = Math.floor(Math.random() * pool.length);
                text = pool.splice(idx, 1)[0];
            }

            let i = 0;
            currentLine.innerHTML = "";
            function print() {
                if (i < text.length) {
                    currentLine.innerHTML += text.charAt(i); i++;
                    setTimeout(print, 80);
                } else {
                    setTimeout(() => {
                        const div = document.createElement('div');
                        div.textContent = text;
                        log.appendChild(div);
                        currentLine.innerHTML = "";
                        if (log.children.length > 5) log.removeChild(log.firstChild);
                        setTimeout(typeEffect, 1500);
                    }, 1000);
                }
            }
            print();
        }

        function startTeaser() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgMusic').play();
            typeEffect();
        }
    </script>
</body>
</html>
