<script>
    const log = document.getElementById('log-content');
    const currentLine = document.getElementById('typing-line');
    const img = document.getElementById('modelImg');
    
    const phrases = [
        "system_reboot... OK", "IAmSleep...", "error_log_undefined", 
        "IAmStillHere", "wait... who's there?", "connection_lost", "WAKE_UP"
    ];

    let pool = [...phrases];
    let isFirst = true;

    // ГЕНЕРАТОР ПОЛНОГО РАНДОМА (БУКВЕННЫЙ МУСОР)
    function generateGlitchText() {
        const chars = "jpsdfkxz01_";
        let result = "";
        const length = Math.floor(Math.random() * 15) + 5; // Длина от 5 до 20 символов
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function heavyClick() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        const o1 = ctx.createOscillator();
        const g1 = ctx.createGain();
        o1.frequency.setValueAtTime(50, t);
        o1.frequency.exponentialRampToValueAtTime(10, t + 0.2);
        g1.gain.setValueAtTime(0.5, t);
        g1.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        o1.connect(g1); g1.connect(ctx.destination);
        o1.start(); o1.stop(t + 0.2);
        img.style.filter = "invert(1) brightness(2)";
        setTimeout(() => img.style.filter = "none", 50);
    }

    function typeEffect() {
        let text;
        
        if (isFirst) {
            text = "system_reboot... OK";
            isFirst = false;
        } else {
            // Шанс 40%, что выпадет полный рандом букв, иначе фраза из списка
            if (Math.random() > 0.6) {
                text = generateGlitchText();
            } else {
                if (pool.length === 0) pool = [...phrases];
                const rand = Math.floor(Math.random() * pool.length);
                text = pool.splice(rand, 1)[0];
            }
        }

        let i = 0;
        currentLine.innerHTML = "";

        function print() {
            if (i < text.length) {
                currentLine.innerHTML += text.charAt(i);
                i++;
                // Скорость печати: если мусор, то печатает рывками (быстрее)
                let speed = text.includes("_") ? 30 : 80;
                setTimeout(print, speed); 
            } else {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.textContent = text;
                    log.appendChild(div);
                    currentLine.innerHTML = "";
                    if (log.children.length > 6) log.removeChild(log.firstChild);
                    setTimeout(typeEffect, 1000 + Math.random() * 2000); 
                }, 1000);
            }
        }
        print();
    }

    function startTeaser() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('bgMusic').play();
        typeEffect();
    }
</script>
