<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Teaser Terminal</title>
    <style>
        body { margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        .model-container img { max-width: 80%; max-height: 80%; filter: drop-shadow(0 0 20px rgba(255,255,255,0.05)); cursor: pointer; transition: opacity 0.1s; }
        
        #console-box { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 300px; height: 160px; 
            background: rgba(0, 0, 0, 0.9); border: 1px solid #222; 
            padding: 10px; font-size: 13px; 
            overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; 
        }

        .cursor { display: inline-block; width: 8px; height: 15px; background: #0f0; margin-left: 5px; animation: blink 0.8s step-end infinite; vertical-align: middle; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #555; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">[ CLICK TO BOOT ]</div>

    <div class="model-container">
        <!-- Убедись, что файл на GitHub называется model.png -->
        <img id="pic" src="model.png" onclick="clickSound()">
    </div>

    <div id="console-box">
        <div id="log"></div>
        <div><span id="line"></span><span class="cursor"></span></div>
    </div>

    <!-- Убедись, что файл на GitHub называется music.mp3 -->
    <audio id="m" src="music.mp3" loop></audio>

    <script>
        const log = document.getElementById('log');
        const line = document.getElementById('line');
        const phrases = ["jpsdfoerkkf", "kkkkkkkkkkkkkkkk", "IAmSleep...", "jpsdf_error", "IAmStillHere", "wait...", "zzzzzzzz"];
        
        let pool = [...phrases];
        let isFirst = true;

        // Тот самый звук клика без файла
        function clickSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                
                const img = document.getElementById('pic');
                img.style.opacity = "0.4";
                setTimeout(() => img.style.opacity = "1", 60);
            } catch(e) {}
        }

        function typeEffect() {
            let text;
            if (isFirst) {
                text = "system_reboot... OK";
                isFirst = false;
            } else {
                if (pool.length === 0) pool = [...phrases];
                const idx = Math.floor(Math.random() * pool.length);
                text = pool.splice(idx, 1)[0];
            }

            let i = 0;
            line.innerHTML = ""; 

            function printChar() {
                if (i < text.length) {
                    line.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(printChar, 80); // Снова медленная печать
                } else {
                    setTimeout(() => {
                        const d = document.createElement('div');
                        d.textContent = text;
                        log.appendChild(d);
                        line.innerHTML = ""; 
                        if (log.children.length > 5) log.removeChild(log.firstChild);
                        // Запускаем следующую фразу бесконечно
                        setTimeout(typeEffect, 1500); 
                    }, 1000);
                }
            }
            printChar();
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('m').play().catch(e => console.log("Audio Error"));
            typeEffect();
        }
    </script>
</body>
</html>
