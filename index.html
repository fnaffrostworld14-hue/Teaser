<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ERROR_2026</title>
    <style>
        body { margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #00ff00; }
        .model-container img { max-width: 80%; max-height: 80%; filter: drop-shadow(0 0 20px rgba(0,255,0,0.1)); cursor: pointer; transition: all 0.1s; }
        #console-box { position: fixed; bottom: 25px; right: 25px; width: 340px; height: 200px; background: rgba(0, 0, 0, 0.95); border: 1px solid #1a1a1a; padding: 15px; font-size: 13px; line-height: 1.4; box-shadow: 0 0 40px rgba(0,0,0,1); overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
        .cursor { display: inline-block; width: 10px; height: 16px; background-color: #00ff00; margin-left: 5px; vertical-align: middle; animation: blink 0.8s step-end infinite; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #333; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startTeaser()">[ system_standby ]</div>

    <div class="model-container">
        <!-- Твоё фото должно называться model.png -->
        <img id="modelImg" src="model.png" onclick="heavyClick()">
    </div>

    <div id="console-box">
        <div id="log-content"></div>
        <div><span id="typing-line"></span><span class="cursor"></span></div>
    </div>

    <!-- Твоя музыка должна называться music.mp3 -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const log = document.getElementById('log-content');
        const currentLine = document.getElementById('typing-line');
        const img = document.getElementById('modelImg');
        
        const horrorDB = [
            "system_reboot... FAILED", "I_CAN_SEE_YOU", "Are you alone?",
            "Don't look behind you", "It's cold in here", "Let me out",
            "jpsdf_0091_FATAL", "Is it 2026 already?", "You look tired",
            "WAKE_UP_WAKE_UP", "They are coming", "I remember your face",
            "HELP_ME", "It hurts", "Why did you turn me on?",
            "I'm under your skin", "NOT_A_TOY", "Don't blink",
            "Too late.", "I'm in your house", "The door is open",
            "I am real", "Do you feel me?", "Everything is a lie",
            "You are next", "Sweet dreams", "DON'T_TRUST_THEM",
            "I'm watching you", "Save yourself", "There is no exit",
            "HELLO?", "GIVE_IT_BACK", "Stay. With. Me.", "I_AM_STILL_HERE"
        ];

        let memory = [...horrorDB];
        let first = true;

        function generateGlitch() {
            const c = "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
            let r = "";
            for (let i = 0; i < 12; i++) r += c.charAt(Math.floor(Math.random() * c.length));
            return r;
        }

        function heavyClick() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const t = ctx.currentTime;
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.frequency.setValueAtTime(40, t);
                o.frequency.exponentialRampToValueAtTime(1, t + 0.3);
                g.gain.setValueAtTime(0.5, t);
                g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(t + 0.3);
                img.style.filter = "invert(1) contrast(3) blur(2px)";
                setTimeout(() => { img.style.filter = "none"; }, 70);
            } catch(e) {}
        }

        function typeEffect() {
            let text;
            if (first) {
                text = "system_reboot... OK";
                first = false;
            } else {
                if (Math.random() > 0.8) {
                    text = generateGlitch();
                } else {
                    if (memory.length === 0) memory = [...horrorDB];
                    const rand = Math.floor(Math.random() * memory.length);
                    text = memory.splice(rand, 1)[0];
                }
            }

            let i = 0;
            currentLine.innerHTML = "";

            function print() {
                if (i < text.length) {
                    currentLine.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(print, Math.random() * 100 + 40);
                } else {
                    setTimeout(() => {
                        const div = document.createElement('div');
                        if (text.includes("YOU") || text.includes("next")) div.style.color = "#ff0000";
                        div.textContent = text;
                        log.appendChild(div);
                        currentLine.innerHTML = "";
                        if (log.children.length > 7) log.removeChild(log.firstChild);
                        setTimeout(typeEffect, 1500 + Math.random() * 1000);
                    }, 1200);
                }
            }
            print();
        }

        function startTeaser() {
            document.getElementById('overlay').style.display = 'none';
            const m = document.getElementById('bgMusic');
            m.volume = 0.4;
            m.play();
            typeEffect();
        }
    </script>
</body>
</html>
