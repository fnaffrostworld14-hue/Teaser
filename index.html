<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teaser</title>
    <style>
        /* Черный фон - база */
        body { margin: 0; background-color: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100;
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        img { max-width: 80%; max-height: 80%; cursor: pointer; }

        #console {
            position: fixed; bottom: 20px; right: 20px;
            width: 300px; height: 150px; background: rgba(0,0,0,0.8);
            border: 1px solid #333; padding: 10px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">[ CLICK TO START ]</div>

    <div class="container">
        <img id="pic" src="model.png" onclick="clickSound()">
    </div>

    <div id="console">
        <div id="log"></div>
        <div id="line"></div>
    </div>

    <audio id="m" src="music.mp3" loop></audio>

    <script>
        function clickSound() {
            // Простейший звук без сложных настроек
            let a = new AudioContext();
            let o = a.createOscillator();
            let g = a.createGain();
            o.connect(g); g.connect(a.destination);
            o.start(); o.stop(a.currentTime + 0.1);
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('m').play();
            run();
        }

        function run() {
            document.getElementById('line').innerHTML = "system_reboot... OK";
            // Через 2 секунды добавим просто случайную надпись
            setTimeout(() => {
                document.getElementById('log').innerHTML += "<div>jpsdfoerkkf</div>";
                document.getElementById('line').innerHTML = "IAmSleep...";
            }, 2000);
        }
    </script>
</body>
</html>
